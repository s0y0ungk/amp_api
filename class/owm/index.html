<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>다낭시 날씨</title>
</head>

<body>
  <h1>다낭시</h1>
  <h2>현재 날씨</h2>

  <h3>날씨 설명 : <span id="cdesc"></span></h3>
  <h3>습도 : <span id="chum"></span></h3>
  <h3>풍속 : <span id="cwind"></span></h3>

  <script>
    const cdesc = document.querySelector("#cdesc");
    const chum = document.querySelector("#chum");
    const cwind = document.querySelector("#cwind");

    fetch(
      "https://api.openweathermap.org/data/2.5/weather?id=1835848&appid=d5948ec3ace590812f0049bbdb822c43&units=metric",
    )
      .then(res => res.json())
      .then(result => {
        console.log(result);
        cdesc.innerText = result.weather[0].description;
        chum.innerText = result.main.humidity;
        cwind.innerText = result.wind.speed;
      });
  </script>
</body>
</html>
