<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>여러개 마커 표시하기</title>

</head>

<body>
  <div id="map" style="width:100%;height:350px;"></div>

  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=f9044ecdcccab8ca097c87e852c514d3"></script>
  <script>
    var mapContainer = document.getElementById('map'), // 지도를 표시할 div  
      mapOption = {
        center: new kakao.maps.LatLng(33.450701, 126.570667), // 지도의 중심좌표
        level: 3 // 지도의 확대 레벨
      };

    var map = new kakao.maps.Map(mapContainer, mapOption); // 지도를 생성합니다

    // 마커를 표시할 위치와 title 객체 배열입니다 
    var positions = [
      {
        title: '강남구청',
        latlng: new kakao.maps.LatLng(37.5172363, 127.0473248)
      },
      {
        title: '마포구청',
        latlng: new kakao.maps.LatLng(37.5663245, 126.901491)
      },
      {
        title: '강서구청',
        latlng: new kakao.maps.LatLng(37.550964, 126.849533)
      }
    ];

    // 마커 이미지의 이미지 주소입니다
    var imageSrc = "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png";

    for (var i = 0; i < positions.length; i++) {

      // 마커 이미지의 이미지 크기 입니다
      var imageSize = new kakao.maps.Size(24, 35);

      // 마커 이미지를 생성합니다    
      var markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize);

      // 마커를 생성합니다
      var marker = new kakao.maps.Marker({
        map: map, // 마커를 표시할 지도
        position: positions[i].latlng, // 마커를 표시할 위치
        title: positions[i].title, // 마커의 타이틀, 마커에 마우스를 올리면 타이틀이 표시됩니다
        image: markerImage // 마커 이미지 
      });
    }
  </script>
</body>

</html>
